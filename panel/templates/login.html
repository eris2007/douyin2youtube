<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>登录 - 抖音转推控制面板</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
<div class="auth-card">
  <h1>抖音转推面板</h1>
  <p class="subtitle">登录你的账号</p>
  <form onsubmit="event.preventDefault(); doLogin(this.username.value, this.password.value);">
    <div class="form-group">
      <label>用户名</label>
      <input name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input name="password" type="password" required>
    </div>
    <button class="btn btn-primary" style="width:100%">登录</button>
    <div id="login-error" style="color:var(--red);font-size:13px;margin-top:8px;display:none"></div>
  </form>
  <div class="footer">
    还没有账号？<a href="/register">注册</a>
  </div>
</div>
<script src="/static/app.js"></script>
<script>
// Override doLogin with error handling for this page
const origLogin = doLogin;
doLogin = async function(u, p) {
  try {
    await origLogin(u, p);
  } catch(e) {
    const el = document.getElementById('login-error');
    el.textContent = e.message; el.style.display = 'block';
  }
};
</script>
</body>
</html>
