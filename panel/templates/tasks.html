<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>任务管理 - 抖音转推控制面板</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/dashboard">📡 抖音转推面板</a>
  <div class="navbar-links">
    <a href="/dashboard">仪表盘</a>
    <a href="/nodes">VPS 管理</a>
    <a href="/tasks" class="active">任务管理</a>
    <a href="/settings">设置</a>
  </div>
  <div class="navbar-right">
    <span>{{ username }}</span>
    <button class="btn-logout" onclick="doLogout()">退出</button>
  </div>
</nav>

<div class="container">
  <h2 style="margin-bottom:20px">任务管理</h2>

  <div class="grid-1-2">
    <!-- Create Task -->
    <div class="card" style="height:fit-content">
      <div class="card-header">创建新任务</div>
      <form onsubmit="event.preventDefault(); startTask();">
        <div class="form-group">
          <label>VPS 节点</label>
          <select id="task-vps" required>
            <option value="">选择 VPS...</option>
          </select>
        </div>
        <div class="form-group">
          <label>任务类型</label>
          <select id="task-type">
            <option value="restream">转推到 YouTube</option>
            <option value="record">仅录制</option>
          </select>
        </div>
        <div class="form-group" id="douyin-group">
          <label>抖音直播间链接</label>
          <input id="task-douyin" placeholder="https://live.douyin.com/123456789" required>
        </div>
        <div class="form-group" id="key-group">
          <label>YouTube 推流密钥</label>
          <input id="task-key" type="password" placeholder="abcd-efgh-ijkl-mnop">
        </div>
        <div class="form-group">
          <label>备用源 URL（可选，逗号分隔）</label>
          <input id="task-backups" placeholder="https://live.douyin.com/备用房间号">
        </div>
        <button class="btn btn-primary" style="width:100%">启动任务</button>
      </form>
    </div>

    <!-- Tasks list -->
    <div>
      <div class="flex items-center gap-2 mb-4">
        <select id="filter-status" onchange="loadTasks()" class="btn btn-outline btn-sm">
          <option value="">全部状态</option>
          <option value="running">运行中</option>
          <option value="stopped">已停止</option>
          <option value="error">异常</option>
        </select>
      </div>
      <div id="tasks-list">
        <div class="text-muted" style="padding:40px;text-align:center">加载中...</div>
      </div>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
<script>
async function loadVpsOptions() {
  try {
    const nodes = await API.get('/api/nodes');
    const sel = document.getElementById('task-vps');
    nodes.forEach(n => { sel.innerHTML += `<option value="${n.id}">${n.name} (${n.host})</option>`; });
    if (nodes.length === 0) sel.innerHTML = '<option value="">请先添加 VPS</option>';
  } catch(e) { console.error(e); }
}

async function startTask() {
  const type = document.getElementById('task-type').value;
  const body = {
    vps_node_id: parseInt(document.getElementById('task-vps').value),
    douyin_url: document.getElementById('task-douyin').value,
    youtube_key: document.getElementById('task-key').value,
    task_type: type,
    backup_urls: document.getElementById('task-backups').value || null,
  };
  if (!body.vps_node_id) { toast('请选择 VPS 节点', 'error'); return; }
  try {
    await API.post('/api/tasks', body);
    toast('任务已启动', 'success');
    document.getElementById('task-douyin').value = '';
    document.getElementById('task-key').value = '';
    document.getElementById('task-backups').value = '';
    loadTasks();
  } catch(e) { toast(e.message, 'error'); }
}

async function stopTask(id) {
  if (!confirm('确定要停止这个任务吗？')) return;
  try { await API.del(`/api/tasks/${id}`); toast('已停止', 'success'); loadTasks(); }
  catch(e) { toast(e.message, 'error'); }
}

async function loadTasks() {
  try {
    const status = document.getElementById('filter-status').value;
    const params = status ? `?status=${status}` : '';
    const tasks = await API.get('/api/tasks' + params);
    const el = document.getElementById('tasks-list');
    if (tasks.length === 0) {
      el.innerHTML = '<div class="text-muted" style="padding:40px;text-align:center">暂无任务</div>';
      return;
    }
    el.innerHTML = tasks.map(t => {
      const badge = t.status === 'running' ? 'badge-green' : t.status === 'error' ? 'badge-red' : 'badge-gray';
      return `<div class="card" style="padding:14px 18px;margin-bottom:8px">
        <div class="flex items-center" style="justify-content:space-between">
          <div>
            <span class="badge ${badge}">${t.status}</span>
            <strong style="margin-left:8px">${t.vps_name || '#'+t.vps_node_id}</strong>
            <span class="text-sm text-muted" style="margin-left:8px">${t.douyin_url.substring(0,40)}...</span>
            <span class="text-sm text-muted">| 密钥: ${t.youtube_key_masked}</span>
          </div>
          <div class="flex gap-2">
            ${t.status === 'running' ? `<button class="btn btn-danger btn-sm" onclick="stopTask(${t.id})">停止</button>` : ''}
            <a href="/tasks/${t.id}" class="btn btn-outline btn-sm">日志</a>
          </div>
        </div>
        <div class="text-sm text-muted mt-4">${formatTime(t.created_at)}</div>
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

loadVpsOptions();
loadTasks();
setInterval(loadTasks, 10000);

document.getElementById('task-type').onchange = function() {
  const isRecord = this.value === 'record';
  document.getElementById('key-group').style.display = isRecord ? 'none' : '';
};
</script>
</body>
</html>
