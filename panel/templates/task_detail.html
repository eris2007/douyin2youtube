<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>任务详情 - 抖音转推控制面板</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/dashboard">📡 抖音转推面板</a>
  <div class="navbar-links">
    <a href="/dashboard">仪表盘</a>
    <a href="/nodes">VPS 管理</a>
    <a href="/tasks" class="active">任务管理</a>
    <a href="/settings">设置</a>
  </div>
  <div class="navbar-right">
    <span>{{ username }}</span>
    <button class="btn-logout" onclick="doLogout()">退出</button>
  </div>
</nav>

<div class="container">
  <div style="margin-bottom:16px">
    <a href="/tasks" style="color:var(--text-secondary);font-size:13px">&larr; 返回任务列表</a>
  </div>

  <div class="card mb-4" id="task-info">
    <div class="flex items-center" style="justify-content:space-between">
      <div>
        <h2 style="margin-bottom:8px">任务 #<span id="task-id-display">{{ task_id }}</span></h2>
        <div class="flex gap-4">
          <span class="text-sm text-muted">VPS: <strong id="t-vps">-</strong></span>
          <span class="text-sm text-muted">类型: <strong id="t-type">-</strong></span>
          <span class="text-sm text-muted">状态: <span id="t-status">-</span></span>
          <span class="text-sm text-muted">时间: <span id="t-time">-</span></span>
        </div>
        <div class="mt-4 text-sm"><span class="text-muted">抖音: </span><code id="t-douyin" style="word-break:break-all">-</code></div>
      </div>
      <button class="btn btn-danger" id="stop-btn" onclick="stopTask()" style="display:none">停止任务</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">实时日志</div>
    <div class="log-viewer" id="log-viewer" style="height:550px">
      <span class="log-system">[系统] 等待连接...</span>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
<script>
const taskId = {{ task_id }};
let evtSource = null;

function appendLog(text, className = '') {
  const viewer = document.getElementById('log-viewer');
  const line = document.createElement('div');
  line.className = className;
  line.textContent = text;
  viewer.appendChild(line);
  viewer.scrollTop = viewer.scrollHeight;
  // Keep last 500 lines
  while (viewer.children.length > 500) viewer.firstChild.remove();
}

function getLogClass(text) {
  if (text.includes('[错误]') || text.includes('error') || text.includes('Error')) return 'log-error';
  if (text.includes('[警告]') || text.includes('warn')) return 'log-warn';
  if (text.includes('[成功]') || text.includes('ok') || text.includes('success')) return 'log-ok';
  if (text.includes('[信息]') || text.includes('info')) return 'log-info';
  if (text.includes('[系统]')) return 'log-system';
  return '';
}

async function loadTaskInfo() {
  try {
    const t = await API.get(`/api/tasks/${taskId}`);
    document.getElementById('t-vps').textContent = t.vps_name || '#' + t.vps_node_id;
    document.getElementById('t-type').textContent = t.task_type === 'record' ? '仅录制' : '转推';
    const badge = document.getElementById('t-status');
    badge.textContent = t.status;
    badge.className = 'badge ' + (t.status === 'running' ? 'badge-green' : t.status === 'error' ? 'badge-red' : 'badge-gray');
    document.getElementById('t-time').textContent = formatTime(t.started_at || t.created_at);
    document.getElementById('t-douyin').textContent = t.douyin_url;
    if (t.status === 'running') document.getElementById('stop-btn').style.display = '';
  } catch(e) { appendLog('[系统] 加载任务信息失败: ' + e.message, 'log-system'); }
}

function connectLogs() {
  if (evtSource) evtSource.close();
  const viewer = document.getElementById('log-viewer');
  viewer.innerHTML = '';
  appendLog('[系统] 正在连接 VPS 获取实时日志...', 'log-system');

  evtSource = new EventSource(`/api/tasks/${taskId}/logs`);
  evtSource.onmessage = function(e) {
    appendLog(e.data, getLogClass(e.data));
  };
  evtSource.onerror = function() {
    appendLog('[系统] 日志流连接中断，5秒后重连...', 'log-system');
    evtSource.close();
    setTimeout(connectLogs, 5000);
  };
}

async function stopTask() {
  if (!confirm('确定要停止这个任务吗？')) return;
  try {
    await API.del(`/api/tasks/${taskId}`);
    toast('任务已停止', 'success');
    document.getElementById('stop-btn').style.display = 'none';
    loadTaskInfo();
  } catch(e) { toast(e.message, 'error'); }
}

loadTaskInfo();
connectLogs();
</script>
</body>
</html>
