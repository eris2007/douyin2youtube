<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>注册 - 抖音转推控制面板</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
<div class="auth-card">
  <h1>创建账号</h1>
  <p class="subtitle">注册新的控制面板账号</p>
  <form onsubmit="event.preventDefault(); doRegister(this.username.value, this.password.value);">
    <div class="form-group">
      <label>用户名</label>
      <input name="username" required autofocus minlength="2" maxlength="64">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input name="password" type="password" required minlength="6">
    </div>
    <button class="btn btn-primary" style="width:100%">注册</button>
    <div id="reg-error" style="color:var(--red);font-size:13px;margin-top:8px;display:none"></div>
  </form>
  <div class="footer">
    已有账号？<a href="/login">登录</a>
  </div>
</div>
<script src="/static/app.js"></script>
<script>
const origReg = doRegister;
doRegister = async function(u, p) {
  try { await origReg(u, p); } catch(e) {
    const el = document.getElementById('reg-error');
    el.textContent = e.message; el.style.display = 'block';
  }
};
</script>
</body>
</html>
